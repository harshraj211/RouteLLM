services:
  api:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install -e . &&
      uvicorn routellm.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      ROUTELLM_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/routellm
      ROUTELLM_REDIS_URL: redis://redis:6379/0
      ROUTELLM_OTEL_ENABLED: "false"
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: routellm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  grafana_data:
