      classification: 0.95
      creative_writing: 0.85
      general_qa: 0.95
      summarization: 0.9
    max_context_tokens: 8192
    pricing:
      input_cost_per_1k_tokens: 0.0
      output_cost_per_1k_tokens: 0.0
    latency:
      p50_ms: 350
      p95_ms: 900
