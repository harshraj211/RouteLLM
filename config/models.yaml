version: 1
models:
  - key: local-small
    provider: ollama
    display_name: Local Fast (Ollama)
    model_id: ${ROUTELLM_OLLAMA_FAST_MODEL:-qwen2.5:3b}
    endpoint: ${ROUTELLM_OLLAMA_BASE_URL:-http://localhost:11434/v1}
    quality_tier: 1
    supports_structured_output: false
    capabilities: [classification, creative_writing, general_qa, summarization]
